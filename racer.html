<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City Racer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }
        
        #gameCanvas {
            display: block;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .ui-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 15px 25px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        
        .ui-box .label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .ui-box .value {
            font-size: 24px;
            font-weight: 700;
        }
        
        #speedometer {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 150px;
            height: 150px;
            border: 3px solid #f0f;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }
        
        #speed {
            font-size: 36px;
            font-weight: 900;
            color: #f0f;
            text-shadow: 0 0 15px #f0f;
        }
        
        #speedUnit {
            font-size: 12px;
            color: #f0f;
            opacity: 0.7;
        }
        
        #levelIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            inset: 0;
            background: rgba(0, 5, 20, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        h1 {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: none;
        }
        
        .subtitle {
            color: #8a8a9e;
            font-size: 18px;
            margin-bottom: 40px;
        }
        
        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            padding: 18px 60px;
            background: linear-gradient(135deg, #0ff, #00aaff);
            border: none;
            border-radius: 50px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #0ff;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #5a5a6e;
            font-size: 12px;
        }
        
        #controls span {
            display: block;
            margin-bottom: 5px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-box">
            <div class="label">SCORE</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="ui-box">
            <div class="label">LEVEL</div>
            <div class="value" id="level">1</div>
        </div>
        <div class="ui-box">
            <div class="label">TIME</div>
            <div class="value" id="time">0:00</div>
        </div>
    </div>
    
    <div id="speedometer">
        <div id="speed">0</div>
        <div id="speedUnit">KM/H</div>
    </div>
    
    <div id="levelIndicator">LEVEL 1</div>
    
    <div id="controls">
        <span>W/↑ - Accelerate</span>
        <span>S/↓ - Brake</span>
        <span>A/← D/→ - Steer</span>
        <span>SPACE - Boost</span>
    </div>
    
    <div id="startScreen">
        <h1>NEON CITY RACER</h1>
        <p class="subtitle">Race through the cyberpunk streets</p>
        <button class="btn" id="startBtn">START GAME</button>
    </div>
    
    <div id="gameOverScreen" class="hidden">
        <h1>GAME OVER</h1>
        <p class="subtitle">Final Score: <span id="finalScore">0</span></p>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000510, 50, 300);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000510);
        renderer.shadowMap.enabled = true;
        document.body.insertBefore(renderer.domElement, document.body.firstChild);
        renderer.domElement.id = 'gameCanvas';
        
        const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
        scene.add(ambientLight);
        
        const moonLight = new THREE.DirectionalLight(0x6666ff, 0.3);
        moonLight.position.set(50, 100, 50);
        scene.add(moonLight);
        
        function createNeonLight(color, x, y, z, intensity = 1) {
            const light = new THREE.PointLight(color, intensity, 50);
            light.position.set(x, y, z);
            scene.add(light);
            
            const geometry = new THREE.SphereGeometry(0.3, 8, 8);
            const material = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            scene.add(sphere);
            
            return light;
        }
        
        const cityBuildings = [];
        const streetLights = [];
        const roadLines = [];
        const obstacles = [];
        const collectibles = [];
        
        let currentLevel = 1;
        let score = 0;
        let gameTime = 0;
        let gameRunning = false;
        
        const car = {
            mesh: null,
            speed: 0,
            maxSpeed: 2,
            acceleration: 0.02,
            deceleration: 0.01,
            turnSpeed: 0,
            maxTurnSpeed: 0.05,
            position: { x: 0, z: 0 },
            boost: false,
            boostFuel: 100
        };
        
        const keys = {};
        document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; keys[e.code] = true; });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; keys[e.code] = false; });
        
        function createCar() {
            const carGroup = new THREE.Group();
            
            const bodyGeometry = new THREE.BoxGeometry(2, 0.8, 4);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff,
                emissive: 0x003333,
                shininess: 100
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.6;
            body.castShadow = true;
            carGroup.add(body);
            
            const topGeometry = new THREE.BoxGeometry(1.6, 0.6, 2);
            const topMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x111133,
                emissive: 0x000022,
                shininess: 100
            });
            const top = new THREE.Mesh(topGeometry, topMaterial);
            top.position.set(0, 1.2, -0.3);
            carGroup.add(top);
            
            const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMaterial = new THREE.MeshPhongMaterial({ color: 0x111111 });
            
            const wheelPositions = [
                { x: -1, z: 1.2 }, { x: 1, z: 1.2 },
                { x: -1, z: -1.2 }, { x: 1, z: -1.2 }
            ];
            
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos.x, 0.4, pos.z);
                carGroup.add(wheel);
            });
            
            const headlightGeometry = new THREE.BoxGeometry(0.3, 0.2, 0.1);
            const headlightMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            [-0.6, 0.6].forEach(x => {
                const headlight = new THREE.Mesh(headlightGeometry, headlightMaterial);
                headlight.position.set(x, 0.5, 2);
                carGroup.add(headlight);
            });
            
            const taillightGeometry = new THREE.BoxGeometry(0.4, 0.2, 0.1);
            const taillightMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            
            [-0.6, 0.6].forEach(x => {
                const taillight = new THREE.Mesh(taillightGeometry, taillightMaterial);
                taillight.position.set(x, 0.5, -2);
                carGroup.add(taillight);
            });
            
            const underglow = new THREE.PointLight(0x00ffff, 2, 10);
            underglow.position.set(0, 0.2, 0);
            carGroup.add(underglow);
            
            car.mesh = carGroup;
            scene.add(carGroup);
        }
        
        function createCity() {
            cityBuildings.forEach(b => scene.remove(b));
            cityBuildings.length = 0;
            
            const buildingColors = [0x1a1a2e, 0x16213e, 0x0f3460, 0x1a1a3a, 0x252545];
            
            for (let side = -1; side <= 1; side += 2) {
                for (let i = 0; i < 50; i++) {
                    const width = 8 + Math.random() * 15;
                    const height = 20 + Math.random() * 60;
                    const depth = 8 + Math.random() * 15;
                    
                    const geometry = new THREE.BoxGeometry(width, height, depth);
                    const material = new THREE.MeshPhongMaterial({ 
                        color: buildingColors[Math.floor(Math.random() * buildingColors.length)]
                    });
                    
                    const building = new THREE.Mesh(geometry, material);
                    building.position.set(
                        side * (25 + width/2 + Math.random() * 10),
                        height/2,
                        -i * 40 + Math.random() * 20
                    );
                    building.castShadow = true;
                    building.receiveShadow = true;
                    
                    scene.add(building);
                    cityBuildings.push(building);
                    
                    if (Math.random() > 0.5) {
                        const windowRows = Math.floor(height / 4);
                        const windowCols = Math.floor(width / 3);
                        
                        for (let row = 0; row < windowRows; row++) {
                            for (let col = 0; col < windowCols; col++) {
                                if (Math.random() > 0.3) {
                                    const windowGeom = new THREE.PlaneGeometry(1.5, 2);
                                    const windowMat = new THREE.MeshBasicMaterial({ 
                                        color: Math.random() > 0.7 ? 0xffff00 : 0x00ffff,
                                        side: THREE.DoubleSide
                                    });
                                    const windowMesh = new THREE.Mesh(windowGeom, windowMat);
                                    windowMesh.position.set(
                                        building.position.x - side * width/2 - side * 0.1,
                                        row * 4 + 3,
                                        building.position.z + (col - windowCols/2) * 3
                                    );
                                    windowMesh.rotation.y = side * Math.PI / 2;
                                    scene.add(windowMesh);
                                }
                            }
                        }
                    }
                    
                    if (height > 40 && Math.random() > 0.5) {
                        const antennaGeom = new THREE.CylinderGeometry(0.1, 0.1, 15, 8);
                        const antennaMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
                        const antenna = new THREE.Mesh(antennaGeom, antennaMat);
                        antenna.position.set(
                            building.position.x,
                            height + 7.5,
                            building.position.z
                        );
                        scene.add(antenna);
                        
                        createNeonLight(0xff0000, antenna.position.x, antenna.position.y + 7, antenna.position.z, 0.5);
                    }
                }
            }
            
            createRoad();
        }
        
        function createRoad() {
            const roadGeometry = new THREE.PlaneGeometry(20, 1000);
            const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -400;
            road.receiveShadow = true;
            scene.add(road);
            
            const lineGeometry = new THREE.PlaneGeometry(0.3, 5);
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            
            for (let i = 0; i < 80; i++) {
                const line = new THREE.Mesh(lineGeometry, lineMaterial);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.01, -i * 10);
                scene.add(line);
                roadLines.push(line);
            }
            
            const sideLineGeometry = new THREE.PlaneGeometry(0.2, 1000);
            const sideLineMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            
            [-10, 10].forEach(x => {
                const sideLine = new THREE.Mesh(sideLineGeometry, sideLineMaterial);
                sideLine.rotation.x = -Math.PI / 2;
                sideLine.position.set(x, 0.01, -400);
                scene.add(sideLine);
            });
            
            for (let i = 0; i < 30; i++) {
                createNeonLight(0x00ffff, -12, 5, -i * 25, 0.8);
                createNeonLight(0xff00ff, 12, 5, -i * 25 + 12, 0.8);
            }
        }
        
        function createObstacle(z) {
            const types = ['barrier', 'cone', 'car'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let geometry, material, mesh;
            
            if (type === 'barrier') {
                geometry = new THREE.BoxGeometry(2, 1, 0.5);
                material = new THREE.MeshPhongMaterial({ color: 0xff6600 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random() - 0.5) * 10, 0.5, z);
            } else if (type === 'cone') {
                geometry = new THREE.ConeGeometry(0.3, 1, 8);
                material = new THREE.MeshPhongMaterial({ color: 0xff3300 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random() - 0.5) * 10, 0.5, z);
            } else {
                geometry = new THREE.BoxGeometry(1.8, 0.7, 3.5);
                material = new THREE.MeshPhongMaterial({ color: 0x330000, emissive: 0x110000 });
                mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random() - 0.5) * 10, 0.5, z);
            }
            
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh, type });
        }
        
        function createCollectible(z) {
            const geometry = new THREE.OctahedronGeometry(0.5);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set((Math.random() - 0.5) * 10, 1.5, z);
            
            const light = new THREE.PointLight(0x00ff00, 1, 5);
            light.position.copy(mesh.position);
            
            scene.add(mesh);
            scene.add(light);
            collectibles.push({ mesh, light });
        }
        
        function spawnObjects() {
            if (obstacles.length < 10 + currentLevel * 2) {
                createObstacle(-200 - Math.random() * 100);
            }
            
            if (collectibles.length < 5 + currentLevel) {
                createCollectible(-150 - Math.random() * 100);
            }
        }
        
        function updateCar() {
            let accelerating = false;
            
            if (keys['w'] || keys['arrowup']) {
                car.speed += car.acceleration;
                accelerating = true;
            }
            if (keys['s'] || keys['arrowdown']) {
                car.speed -= car.deceleration * 2;
            }
            
            if (keys[' '] && car.boostFuel > 0) {
                car.boost = true;
                car.speed += 0.03;
                car.boostFuel -= 0.5;
            } else {
                car.boost = false;
                car.boostFuel = Math.min(100, car.boostFuel + 0.1);
            }
            
            if (!accelerating) {
                car.speed *= 0.98;
            }
            
            car.speed = Math.max(0, Math.min(car.maxSpeed * (car.boost ? 1.5 : 1), car.speed));
            
            let turning = false;
            if (keys['a'] || keys['arrowleft']) {
                car.turnSpeed = Math.max(-car.maxTurnSpeed, car.turnSpeed - 0.005);
                turning = true;
            } else if (keys['d'] || keys['arrowright']) {
                car.turnSpeed = Math.min(car.maxTurnSpeed, car.turnSpeed + 0.005);
                turning = true;
            } else {
                car.turnSpeed *= 0.9;
            }
            
            if (car.speed > 0.1) {
                car.position.x += car.turnSpeed * car.speed * 30;
                car.position.x = Math.max(-8, Math.min(8, car.position.x));
            }
            
            car.mesh.position.x = car.position.x;
            car.mesh.rotation.y = -car.turnSpeed * 2;
            car.mesh.rotation.z = -car.turnSpeed * 0.5;
            
            if (car.boost) {
                car.mesh.children[0].material.emissive.setHex(0x00ffff);
            } else {
                car.mesh.children[0].material.emissive.setHex(0x003333);
            }
            
            document.getElementById('speed').textContent = Math.floor(car.speed * 150);
            
            return car.speed;
        }
        
        function updateCamera(carSpeed) {
            camera.position.x = car.mesh.position.x * 0.3;
            camera.position.y = 5 + carSpeed * 2;
            camera.position.z = 10;
            camera.lookAt(car.mesh.position.x, 1, -20);
        }
        
        function checkCollisions() {
            const carBox = new THREE.Box3().setFromObject(car.mesh);
            
            obstacles.forEach((obs, i) => {
                const obsBox = new THREE.Box3().setFromObject(obs.mesh);
                if (carBox.intersectsBox(obsBox)) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    
                    if (obs.type !== 'cone') {
                        car.speed *= 0.3;
                        score -= 50;
                        document.getElementById('score').textContent = score;
                    }
                }
            });
            
            collectibles.forEach((col, i) => {
                const colBox = new THREE.Box3().setFromObject(col.mesh);
                if (carBox.intersectsBox(colBox)) {
                    scene.remove(col.mesh);
                    scene.remove(col.light);
                    collectibles.splice(i, 1);
                    score += 100;
                    document.getElementById('score').textContent = score;
                }
            });
        }
        
        function updateCollectibles() {
            collectibles.forEach(col => {
                col.mesh.rotation.y += 0.05;
                col.mesh.rotation.x += 0.02;
                col.mesh.position.y = 1.5 + Math.sin(Date.now() * 0.003) * 0.3;
            });
        }
        
        function showLevel(level) {
            const indicator = document.getElementById('levelIndicator');
            indicator.textContent = `LEVEL ${level}`;
            indicator.style.opacity = 1;
            setTimeout(() => { indicator.style.opacity = 0; }, 2000);
            
            car.maxSpeed = 1.5 + level * 0.3;
        }
        
        let lastTime = 0;
        function gameLoop(time) {
            if (!gameRunning) return;
            
            const delta = time - lastTime;
            lastTime = time;
            
            gameTime += delta;
            
            const minutes = Math.floor(gameTime / 60000);
            const seconds = Math.floor((gameTime % 60000) / 1000);
            document.getElementById('time').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            const carSpeed = updateCar();
            
            roadLines.forEach(line => {
                line.position.z += carSpeed * 10;
                if (line.position.z > 20) {
                    line.position.z -= 800;
                }
            });
            
            obstacles.forEach((obs, i) => {
                obs.mesh.position.z += carSpeed * 10;
                if (obs.mesh.position.z > 20) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                }
            });
            
            collectibles.forEach((col, i) => {
                col.mesh.position.z += carSpeed * 10;
                col.light.position.z = col.mesh.position.z;
                if (col.mesh.position.z > 20) {
                    scene.remove(col.mesh);
                    scene.remove(col.light);
                    collectibles.splice(i, 1);
                }
            });
            
            spawnObjects();
            checkCollisions();
            updateCollectibles();
            updateCamera(carSpeed);
            
            if (carSpeed > 0.1) {
                score += Math.floor(carSpeed * 0.1);
                document.getElementById('score').textContent = score;
            }
            
            if (score > currentLevel * 2000) {
                currentLevel++;
                document.getElementById('level').textContent = currentLevel;
                showLevel(currentLevel);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            score = 0;
            gameTime = 0;
            currentLevel = 1;
            
            car.position = { x: 0, z: 0 };
            car.speed = 0;
            car.boostFuel = 100;
            
            obstacles.forEach(o => scene.remove(o.mesh));
            obstacles.length = 0;
            collectibles.forEach(c => { scene.remove(c.mesh); scene.remove(c.light); });
            collectibles.length = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            document.getElementById('time').textContent = '0:00';
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            showLevel(1);
            gameRunning = true;
            lastTime = performance.now();
            gameLoop(performance.now());
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        function init() {
            createCar();
            createCity();
            
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, -20);
            
            function animate() {
                if (!gameRunning) {
                    renderer.render(scene, camera);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        init();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
