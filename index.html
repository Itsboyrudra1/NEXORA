
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Street Racer - PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0f0f23;
            color: white;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .background {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 50%, #16213e 100%);
        }
        
        .skyline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 0 10px;
        }
        
        .building {
            width: 35px;
            background: #0a0a15;
            position: relative;
        }
        
        .window {
            position: absolute;
            width: 8px;
            height: 10px;
            background: #f4d03f;
            opacity: 0.6;
        }
        
        .moon {
            position: absolute;
            top: 15px;
            right: 40px;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #fff 0%, #ddd 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100px;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .road {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 70%;
            left: 15%;
            background: #2d2d2d;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        
        .road-border {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 12px;
            background: white;
        }
        
        .road-border.left { left: 0; }
        .road-border.right { right: 0; }
        
        .lane-markings {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
        }
        
        .lane-dash {
            width: 100%;
            height: 50px;
            background: white;
            margin: 25px 0;
            opacity: 0.8;
        }
        
        .player-car {
            position: absolute;
            width: 60px;
            height: 100px;
            transition: left 0.05s ease-out;
            z-index: 10;
        }
        
        .car-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #e53935 0%, #b71c1c 100%);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.4);
        }
        
        .car-windshield {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            height: 28px;
            background: #1a1a2e;
            border-radius: 6px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px;
        }
        
        .headlight {
            width: 14px;
            height: 10px;
            background: #f4d03f;
            border-radius: 3px;
            box-shadow: 0 0 10px #f4d03f;
        }
        
        .car-stripe {
            position: absolute;
            top: 50%;
            left: 8px;
            right: 8px;
            height: 6px;
            background: white;
            transform: translateY(-50%);
            border-radius: 3px;
        }
        
        .car-wheels {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 4px;
        }
        
        .wheel {
            width: 14px;
            height: 22px;
            background: #1a1a2e;
            border-radius: 4px;
        }
        
        .obstacle {
            position: absolute;
            width: 45px;
            height: 75px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            padding-top: 40px;
        }
        
        .score-box, .speed-box {
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #8c2bee;
        }
        
        .score-icon { font-size: 20px; }
        .score-text, .speed-text {
            font-size: 18px;
            font-weight: bold;
        }
        
        .gear-display {
            background: #8c2bee;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 100;
            padding-bottom: 30px;
        }
        
        .gearbox {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .gear-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .gear-btn.active {
            background: #8c2bee;
            border-color: #8c2bee;
            color: white;
            box-shadow: 0 0 20px rgba(140, 43, 238, 0.5);
        }
        
        .steering {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        
        .steer-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 3px solid #8c2bee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.1s;
        }
        
        .steer-btn:active {
            background: rgba(140, 43, 238, 0.3);
            transform: scale(0.95);
        }
        
        .nitro-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 25px rgba(230, 126, 34, 0.5);
        }
        
        .nitro-btn:active {
            transform: scale(0.95);
        }
        
        .touch-area {
            position: absolute;
            top: 180px;
            bottom: 250px;
            left: 15%;
            right: 15%;
            z-index: 5;
        }
        
        .game-over, .pause-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .game-over h1 {
            font-size: 48px;
            color: #e74c3c;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        
        .game-over .score {
            font-size: 36px;
            color: #f1c40f;
            margin-bottom: 10px;
        }
        
        .game-over .distance {
            font-size: 24px;
            color: #3498db;
            margin-bottom: 40px;
        }
        
        .pause-screen h1 {
            font-size: 56px;
            color: white;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 18px 45px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8c2bee, #6c1fb5);
            color: white;
            box-shadow: 0 10px 30px rgba(140, 43, 238, 0.4);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .pause-btn {
            position: absolute;
            top: 45px;
            right: 15px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            border: none;
            font-size: 20px;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="background">
            <div class="stars">
                <div class="star" style="top: 20px; left: 10%;"></div>
                <div class="star" style="top: 40px; left: 30%; animation-delay: 0.5s;"></div>
                <div class="star" style="top: 15px; left: 50%; animation-delay: 1s;"></div>
                <div class="star" style="top: 50px; left: 70%; animation-delay: 1.5s;"></div>
                <div class="star" style="top: 30px; left: 85%; animation-delay: 0.3s;"></div>
            </div>
            <div class="moon"></div>
            <div class="skyline" id="skyline"></div>
        </div>
        
        <div class="road" id="road">
            <div class="road-border left"></div>
            <div class="road-border right"></div>
            <div class="lane-markings" id="laneMarkings">
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
                <div class="lane-dash"></div>
            </div>
        </div>
        
        <div class="touch-area" id="touchArea"></div>
        
        <div class="player-car" id="playerCar" style="top: 60%; left: 50%; transform: translateX(-50%);">
            <div class="car-body">
                <div class="car-windshield">
                    <div class="headlight"></div>
                    <div class="headlight"></div>
                </div>
                <div class="car-stripe"></div>
                <div class="car-wheels">
                    <div class="wheel"></div>
                    <div class="wheel"></div>
                </div>
            </div>
        </div>
        
        <div class="ui-overlay">
            <div class="score-box">
                <span class="score-icon">⭐</span>
                <span class="score-text" id="scoreDisplay">0</span>
            </div>
            <div class="speed-box">
                <span>⚡</span>
                <span class="speed-text" id="speedDisplay">100 km/h</span>
                <div class="gear-display" id="gearDisplay">G1</div>
            </div>
        </div>
        
        <button class="pause-btn" id="pauseBtn">⏸️</button>
        
        <div class="controls">
            <div class="gearbox">
                <button class="gear-btn active" data-gear="1">1</button>
                <button class="gear-btn" data-gear="2">2</button>
                <button class="gear-btn" data-gear="3">3</button>
                <button class="gear-btn" data-gear="4">4</button>
                <button class="gear-btn" data-gear="5">5</button>
            </div>
            <div class="steering">
                <button class="steer-btn" id="leftBtn">⬅️</button>
                <button class="nitro-btn" id="nitroBtn">🔥</button>
                <button class="steer-btn" id="rightBtn">➡️</button>
            </div>
        </div>
        
        <div class="game-over hidden" id="gameOver">
            <h1>GAME OVER</h1>
            <div class="score">Score: <span id="finalScore">0</span></div>
            <div class="distance">Distance: <span id="finalDistance">0</span>m</div>
            <button class="btn btn-primary" id="restartBtn">
                <span>🔄</span> PLAY AGAIN
            </button>
        </div>
        
        <div class="pause-screen hidden" id="pauseScreen">
            <h1>PAUSED</h1>
            <button class="btn btn-primary" id="resumeBtn">
                <span>▶️</span> RESUME
            </button>
        </div>
    </div>

    <script>
        let carPosition = 0;
        let score = 0;
        let speed = 5;
        let gear = 1;
        let distance = 0;
        let isGameOver = false;
        let isPaused = false;
        let obstacles = [];
        let obstacleId = 0;
        let gameLoop = null;
        let roadAnimation = null;
        
        const playerCar = document.getElementById('playerCar');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const gearDisplay = document.getElementById('gearDisplay');
        const laneMarkings = document.getElementById('laneMarkings');
        const gameOverScreen = document.getElementById('gameOver');
        const pauseScreen = document.getElementById('pauseScreen');
        const finalScore = document.getElementById('finalScore');
        const finalDistance = document.getElementById('finalDistance');
        const touchArea = document.getElementById('touchArea');
        
        function generateBuildings() {
            const skyline = document.getElementById('skyline');
            for (let i = 0; i < 15; i++) {
                const building = document.createElement('div');
                building.className = 'building';
                building.style.height = (60 + Math.random() * 100) + 'px';
                
                for (let j = 0; j < 6; j++) {
                    if (Math.random() > 0.4) {
                        const window = document.createElement('div');
                        window.className = 'window';
                        window.style.top = (10 + j * 15) + 'px';
                        window.style.left = (5 + Math.random() * 20) + 'px';
                        window.style.background = Math.random() > 0.5 ? '#f4d03f' : '#3498db';
                        building.appendChild(window);
                    }
                }
                skyline.appendChild(building);
            }
        }
        
        function updateCarPosition() {
            const roadWidth = window.innerWidth * 0.7;
            const carX = (window.innerWidth * 0.15) + (roadWidth / 2) + carPosition - 30;
            playerCar.style.left = carX + 'px';
        }
        
        function spawnObstacle() {
            if (obstacles.length >= 5) return;
            if (Math.random() > 0.03) return;
            
            const roadWidth = window.innerWidth * 0.7;
            const roadLeft = window.innerWidth * 0.15;
            const x = roadLeft + Math.random() * (roadWidth - 50) + 10;
            
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.id = 'obstacle-' + obstacleId++;
            
            const colors = ['#3498db', '#2ecc71', '#e67e22', '#9b59b6', '#1abc9c'];
            const cars = ['🚗', '🚕', '🚙', '🏎️', '🚓'];
            const colorIndex = Math.floor(Math.random() * colors.length);
            
            obstacle.style.background = colors[colorIndex];
            obstacle.style.left = x + 'px';
            obstacle.style.top = '-80px';
            obstacle.innerHTML = cars[colorIndex];
            
            document.getElementById('game-container').appendChild(obstacle);
            
            obstacles.push({
                element: obstacle,
                x: x,
                y: -80,
                width: 45,
                height: 75
            });
        }
        
        function moveObstacles() {
            const carRect = playerCar.getBoundingClientRect();
            
            obstacles.forEach((obs, index) => {
                obs.y += speed * 1.5;
                obs.element.style.top = obs.y + 'px';
                
                if (
                    carRect.right > obs.x + 10 &&
                    carRect.left < obs.x + obs.width - 10 &&
                    carRect.bottom > obs.y + 10 &&
                    carRect.top < obs.y + obs.height - 10
                ) {
                    gameOver();
                }
                
                if (obs.y > window.innerHeight) {
                    obs.element.remove();
                    obstacles.splice(index, 1);
                }
            });
        }
        
        function animateRoad() {
            let offset = 0;
            roadAnimation = setInterval(() => {
                if (isPaused || isGameOver) return;
                offset += speed * 2;
                if (offset >= 100) offset = 0;
                laneMarkings.style.transform = `translateY(${offset}px)`;
            }, 50);
        }
        
        function gameLoopStart() {
            gameLoop = setInterval(() => {
                if (isPaused || isGameOver) return;
                
                distance += speed;
                score = Math.floor(distance / 100);
                
                scoreDisplay.textContent = score;
                speedDisplay.textContent = (speed * 20) + ' km/h';
                
                spawnObstacle();
                moveObstacles();
            }, 50);
        }
        
        function shiftGear(newGear) {
            gear = newGear;
            speed = 3 + gear * 2;
            
            document.querySelectorAll('.gear-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.gear) === gear) {
                    btn.classList.add('active');
                }
            });
            
            gearDisplay.textContent = 'G' + gear;
            speedDisplay.textContent = (speed * 20) + ' km/h';
        }
        
        function nitroBoost() {
            const originalSpeed = speed;
            speed += 8;
            speedDisplay.textContent = (speed * 20) + ' km/h';
            speedDisplay.style.color = '#e67e22';
            
            setTimeout(() => {
                speed = originalSpeed;
                speedDisplay.textContent = (speed * 20) + ' km/h';
                speedDisplay.style.color = 'white';
            }, 2000);
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(roadAnimation);
            
            finalScore.textContent = score;
            finalDistance.textContent = distance;
            gameOverScreen.classList.remove('hidden');
        }
        
        function restartGame() {
            obstacles.forEach(obs => obs.element.remove());
            obstacles = [];
            
            carPosition = 0;
            score = 0;
            distance = 0;
            gear = 1;
            speed = 5;
            isGameOver = false;
            isPaused = false;
            
            updateCarPosition();
            scoreDisplay.textContent = '0';
            speedDisplay.textContent = '100 km/h';
            gearDisplay.textContent = 'G1';
            
            document.querySelectorAll('.gear-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.gear) === 1) {
                    btn.classList.add('active');
                }
            });
            
            gameOverScreen.classList.add('hidden');
            pauseScreen.classList.add('hidden');
            
            animateRoad();
            gameLoopStart();
        }
        
        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pauseScreen.classList.remove('hidden');
            } else {
                pauseScreen.classList.add('hidden');
            }
        }
        
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('resumeBtn').addEventListener('click', togglePause);
        
        document.querySelectorAll('.gear-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                shiftGear(parseInt(btn.dataset.gear));
            });
        });
        
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (!isGameOver && !isPaused) {
                carPosition -= 20;
                carPosition = Math.max(carPosition, -window.innerWidth * 0.25);
                updateCarPosition();
            }
        });
        
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (!isGameOver && !isPaused) {
                carPosition += 20;
                carPosition = Math.min(carPosition, window.innerWidth * 0.25);
                updateCarPosition();
            }
        });
        
        document.getElementById('nitroBtn').addEventListener('click', () => {
            if (!isGameOver && !isPaused) {
                nitroBoost();
            }
        });
        
        let touchStartX = 0;
        touchArea.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        touchArea.addEventListener('touchmove', (e) => {
            if (isGameOver || isPaused) return;
            e.preventDefault();
            
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            if (Math.abs(diff) > 10) {
                carPosition += diff * 0.3;
                carPosition = Math.max(carPosition, -window.innerWidth * 0.25);
                carPosition = Math.min(carPosition, window.innerWidth * 0.25);
                updateCarPosition();
                touchStartX = touchX;
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (isGameOver || isPaused) return;
            
            if (e.key === 'ArrowLeft') {
                carPosition -= 20;
                carPosition = Math.max(carPosition, -window.innerWidth * 0.25);
                updateCarPosition();
            } else if (e.key === 'ArrowRight') {
                carPosition += 20;
                carPosition = Math.min(carPosition, window.innerWidth * 0.25);
                updateCarPosition();
            } else if (e.key === ' ') {
                nitroBoost();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '5') {
                shiftGear(parseInt(e.key));
            }
        });
        
        generateBuildings();
        updateCarPosition();
        animateRoad();
        gameLoopStart();
        
        window.addEventListener('resize', updateCarPosition);
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
